# Serviço LAI — chat conversacional sobre as decisões da IA (feature da plataforma).
# Login próprio (SuperMQ users), isolamento por owner_user_id, MCP sobre o banco
# `decisions` + TimescaleDB. Widget injetado na UI via nginx sub_filter.
#
# Incluído no `make run_latest` junto com o addon decisioning.

networks:
  magistrala-base-net:
    driver: bridge

services:
  lai:
    build:
      context: ../../
      dockerfile: Dockerfile.lai
    image: realtime-iot/lai:latest
    container_name: magistrala-lai
    restart: on-failure
    environment:
      DECISIONS_DB_URL: ${LAI_DECISIONS_DB_URL:-postgresql://magistrala:magistrala@magistrala-re-db:5432/decisions}
      TIMESCALE_DB_URL: ${LAI_TIMESCALE_DB_URL:-postgresql://supermq:supermq@magistrala-timescale:5432/supermq}
      SUPERMQ_USERS_URL: ${LAI_SUPERMQ_USERS_URL:-http://users:9002}
      # Herança de login da UI (SSO): lê accessToken de /api/auth/session.
      UI_SESSION_URL: ${LAI_UI_SESSION_URL:-http://ui:3000}
      # Deve casar com o host do NEXTAUTH_URL da UI (NextAuth valida o host).
      UI_SESSION_HOST: ${LAI_UI_SESSION_HOST:-100.53.189.141}
      LLM_PROVIDER: ${DECISIONING_LLM_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${DECISIONING_OPENAI_MODEL:-gpt-4o}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${DECISIONING_GEMINI_MODEL:-gemini/gemini-flash-latest}
      LOCAL_MODEL: ${DECISIONING_LOCAL_MODEL:-ollama/llama3}
      LOCAL_API_BASE: ${DECISIONING_LOCAL_API_BASE:-http://host.docker.internal:11434}
      LOCAL_API_KEY: ${DECISIONING_LOCAL_API_KEY:-not-needed}
      LAI_SESSION_SECRET: ${LAI_SESSION_SECRET:-lai-dev-secret-change-me}
      LAI_SESSION_TTL: ${LAI_SESSION_TTL:-28800}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - magistrala-base-net
